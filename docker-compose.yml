version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-recruitment_portal}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://db:3306/recruitment_portal?useSSL=false&serverTimezone=UTC}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-password}
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:
